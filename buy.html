<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Buy Now | Hasiru Haadi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- CSS -->
  <link rel="stylesheet" href="style/style.css" />
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container header-content">
      <h1 class="logo">
        <img src="images/logo.png" alt="Hasiru Haadi Logo" class="logo-img" />
        <span>Hasiru Haadi | ಹಸಿರು ಹಾದಿ</span>
      </h1>
      
      <nav class="navbar">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html" class="active">Shop</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Order Form -->
  <main class="order-page container">
    <h2>🛍️ Place Your Order</h2>
    <p class="form-intro">Fill in your details below to confirm your order. We’ll reach out to you soon 🌱</p>

    <form action="https://formsubmit.co/hasiruhaadi@gmail.com" method="POST" class="order-form">
      <!-- Hidden fields -->
      <input type="hidden" name="_captcha" value="false" />
      <input type="hidden" name="_next" value="http://127.0.0.1:5500/thankyoufororder.html" />

      <!-- Customer Details -->
      <label for="name">Full Name:</label>
      <input type="text" id="name" name="name" required />

      <label for="phone">Phone Number:</label>
      <input type="tel" id="phone" name="phone" required />

      <label for="address">Delivery Address:</label>
      <textarea id="address" name="address" rows="4" required></textarea>

      <!-- Product Selection -->
      <label for="product">Product:</label>
      <select id="product" name="product" required>
        <option value="">-- Select Product --</option>
        <option value="Snake Plant">Snake Plant – ₹149</option>
        <option value="Little Gem">Little Gem – ₹99</option>
        <option value="Moss Rose">Moss Rose – ₹59</option>
      </select>

      <label for="quantity">Quantity:</label>
      <input type="number" id="quantity" name="quantity" min="1" value="1" required />

      <!-- Total -->
      <div id="total" class="order-total">Total: ₹0</div>

      <!-- Submit -->
      <button type="submit" class="btn primary-btn">✅ Place Order</button>
    </form>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>© 2025 Hasiru Haadi | ಹಸಿರು ಹಾದಿ — All Rights Reserved</p>
    </div>
  </footer>

  <!-- Script for live total -->
  <script>
    const productSelect = document.getElementById('product');
    const quantityInput = document.getElementById('quantity');
    const totalDiv = document.getElementById('total');

    const prices = {
      "Snake Plant": 149,
      "Little Gem": 99,
      "Moss Rose": 59
    };

    function updateTotal() {
      const selectedProduct = productSelect.value;
      const quantity = parseInt(quantityInput.value) || 0;
      const price = prices[selectedProduct] || 0;
      totalDiv.textContent = `Total: ₹${price * quantity}`;
    }

    productSelect.addEventListener('change', updateTotal);
    quantityInput.addEventListener('input', updateTotal);
    updateTotal();
  </script>
</body>
</html>
