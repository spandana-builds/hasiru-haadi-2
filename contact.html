<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Hasiru Haadi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* --- ROOT VARIABLES (Consistent with all pages) --- */
        :root {
            --dark-green: #2F4F2F; /* Deep Forest Green */
            --accent-gold: #D4AF37; /* Gold/Ochre */
            --background-ivory: #FFFAF0; /* Floral White/Ivory */
            --text-dark: #333333;
            --text-light-gray: #555;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Poppins', sans-serif;
        }

        /* --- GENERAL STYLES (Consistent with all pages) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--background-ivory);
            color: var(--text-dark);
            line-height: 1.7;
            overflow-x: hidden;
            font-weight: 300;
        }

        /* --- HEADER & FOOTER (Identical to all pages) --- */
        header {
            background: rgba(255, 250, 240, 0.85);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        header h1 {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--dark-green);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        header h1 img {
            transition: transform 0.3s ease;
        }

        header h1:hover img {
            transform: scale(1.1);
        }

        header p {
            font-style: italic;
            color: #666;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            font-weight: 300;
        }
        
        nav a {
            color: var(--dark-green);
            text-decoration: none;
            margin: 0 1rem;
            font-weight: 400;
            position: relative;
            padding-bottom: 8px;
            transition: color 0.3s ease;
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--accent-gold);
            transition: width 0.3s cubic-bezier(0.65, 0, 0.35, 1);
        }

        nav a:hover {
            color: var(--text-dark);
        }

        nav a:hover::after {
            width: 100%;
        }

        footer {
            text-align: center;
            padding: 2.5rem 1rem;
            background: #e7e2d9;
            color: var(--text-light-gray);
            font-size: 0.9rem;
            margin-top: 6rem;
        }

        /* --- CONTACT PAGE SPECIFIC STYLES --- */
        .contact {
            max-width: 700px;
            margin: 0 auto;
            padding: 4rem 5% 6rem;
            text-align: center;
        }
        
        .contact h2 {
            font-family: var(--font-heading);
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            color: var(--dark-green);
            margin-bottom: 1rem;
            animation: fadeInDown 1s ease-out;
        }

        .contact > p {
            font-size: 1.1rem;
            color: var(--text-light-gray);
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease-out 0.2s;
            animation-fill-mode: backwards;
        }

        .contact-options {
            background: #fff;
            padding: 3rem;
            border-radius: 10px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.07);
        }
        
        .email-link {
            display: inline-block;
            text-decoration: none;
            color: var(--dark-green);
            font-weight: 600;
            margin-bottom: 2rem;
            position: relative;
            transition: color 0.3s ease;
        }
        
        .email-link::after {
             content: '';
            position: absolute;
            width: 100%;
            height: 1px;
            bottom: -4px;
            left: 0;
            background-color: var(--accent-gold);
            transform: scaleX(0);
            transition: transform 0.4s cubic-bezier(0.65, 0, 0.35, 1);
        }
        
        .email-link:hover {
            color: var(--accent-gold);
        }

        .email-link:hover::after {
            transform: scaleX(1);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            text-align: left;
        }
        
        form input,
        form textarea {
            width: 100%;
            padding: 1rem;
            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 300;
            border: 1px solid #ddd;
            border-radius: 8px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        form input:focus,
        form textarea:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.25);
        }

        /* Staggered form animation */
        form input[name="name"] { animation-delay: 0.4s; }
        form input[name="email"] { animation-delay: 0.5s; }
        form textarea[name="message"] { animation-delay: 0.6s; }
        form button { animation-delay: 0.7s; }

        .btn {
            display: inline-block;
            background: var(--accent-gold);
            color: var(--text-dark);
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            border: 2px solid var(--accent-gold);
            transition: all 0.4s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            width: 100%;
        }

        .btn:hover {
            background: transparent;
            color: var(--accent-gold);
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }


        /* --- KEYFRAMES --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>
  <header>
    <h1><img src="images/logo.png" alt="Hasiru Haadi Logo" style="height: 40px; vertical-align: middle;"> Hasiru Haadi | ಹಸಿರು ಹಾದಿ</h1>
    <p>Handpicked | Home-grown | Eco-love</p>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="shop.html">Shop</a>
      <a href="gallery.html">Gallery</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="contact">
      <h2>Contact Us</h2>
      <p>We’d love to hear from you! You can email us directly or use the contact form below.</p>

      <div class="contact-options">
        <a class="email-link" href="mailto:hasiruhaadi@gmail.com">✉️ Send us an Email</a>
        
        <div style="text-align: center; margin: 2rem 0; color: #aaa;">— OR —</div>

        <form action="https://formsubmit.co/hasiruhaadi@gmail.com" method="POST">
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_next" value="https://spandu31.github.io/hasiru-haadi-2/thankyou.html">

          <input type="text" name="name" placeholder="Your Name" required>
          <input type="email" name="email" placeholder="Your Email" required>
          <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
          <button type="submit" class="btn">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2025 Hasiru Haadi | ಹಸಿರು ಹಾದಿ — All Rights Reserved</p>
  </footer>
</body>
</html>
